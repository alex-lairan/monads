name: Monads CI

on:
  push:
    branches: [master]
  pull_request:
    branches: "*"

jobs:
  check_format:
    strategy:
      fail-fast: false
      matrix:
        crystal_version:
          - 1.15.1
          - 1.16.0
          - 1.17.0
          - 1.18.0
          - 1.19.0
          - 1.20.2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal_version }}
      - name: Install shards
        run: shards install
      - name: Format
        run: crystal tool format --check
      - name: Lint
        run: ./bin/ameba
  specs:
    strategy:
      fail-fast: false
      matrix:
        crystal_version:
          - 1.15.1
          - 1.16.0
          - 1.17.0
          - 1.18.0
          - 1.19.0
          - 1.20.2
        experimental:
          - false
        include:
          - crystal_version: nightly
            experimental: true
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    steps:
      - uses: actions/checkout@v4
      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: ${{ matrix.crystal_version }}
      # Skip development dependencies (ameba): the linter is only needed by the
      # check_format job, and its postinstall build does not compile against
      # Crystal nightly. Installing it here would make the specs job fail for a
      # reason unrelated to the library under test.
      - name: Install shards
        run: shards install --ignore-crystal-version --without-development
      - name: Run tests
        run: crystal spec
